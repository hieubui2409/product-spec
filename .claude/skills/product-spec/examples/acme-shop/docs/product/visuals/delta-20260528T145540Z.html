<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Delta View</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; padding: 2rem; max-width: 1100px; margin: 0 auto; color: #222; }
    h1 { font-size: 1.5rem; margin-bottom: 0.25rem; }
    .meta { color: #666; font-size: 0.85rem; margin-bottom: 1.5rem; }
    .diagram { background: #fafafa; padding: 1rem; border: 1px solid #e0e0e0; border-radius: 6px; overflow: auto; }
    pre { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 0.85rem; }
    .controls { margin-bottom: 0.75rem; }
    .controls button { padding: 4px 10px; margin-right: 6px; cursor: pointer; }
    .note { color: #888; font-size: 0.8rem; margin-top: 1.5rem; }
  </style>
</head>
<body>
  <h1>Delta View</h1>
  <div class="meta">Generated 2026-05-28T14:55:40Z · Product: Acme Shop · View: delta</div>
  <div class="controls">
    <button onclick="zoomIn()">Zoom +</button>
    <button onclick="zoomOut()">Zoom -</button>
    <button onclick="resetZoom()">Reset</button>
  </div>
  <div class="diagram" id="diagram"><pre>(no baseline yet — run --validate to create one)</pre></div>
  <p class="note">Self-contained HTML. To re-render: python3 visualize.py --view delta --format html --root &lt;dir&gt;</p>
  <script>

  </script>
  <script>
    if (window.mermaid) {
      window.mermaid.initialize({ startOnLoad: true, securityLevel: "strict" });
    }
    let scale = 1;
    function applyScale() {
      const d = document.getElementById("diagram");
      d.style.transform = `scale(${scale})`;
      d.style.transformOrigin = "top left";
    }
    function zoomIn() { scale = Math.min(scale + 0.1, 3); applyScale(); }
    function zoomOut() { scale = Math.max(scale - 0.1, 0.3); applyScale(); }
    function resetZoom() { scale = 1; applyScale(); }
  </script>
</body>
</html>
