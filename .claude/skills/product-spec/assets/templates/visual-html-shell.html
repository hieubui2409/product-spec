<!DOCTYPE html>
<html lang="{{lang}}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{title}}</title>
  {{viewer_head}}
  <style>
    /* Legacy graph-view specifics layered on the shared design system. */
    /* Graph views use the full window width (the shared 1100px wrap is meant for
       reading prose, too cramped for a zoomed graph/gantt). */
    .ps-wrap { max-width: none; }
    /* The diagram is a fixed full-height scroll viewport, NOT an auto-sized box:
       a CSS `transform: scale()` grows the content visually but leaves its layout
       box unchanged, so without a tall viewport a zoomed-in diagram is clipped to
       its original size with no room to pan. `calc(100vh - …)` reserves space for
       the title + meta + zoom controls above and the footer note below, so the
       footer stays on screen while the diagram fills the rest. */
    .diagram { overflow: auto; height: calc(100vh - 12rem); }
    .controls { margin-bottom: 0.75rem; }
    .controls button { padding: 4px 10px; margin-right: 6px; cursor: pointer; background: var(--surface); color: var(--text); border: 1px solid var(--border); border-radius: 6px; }
    /* Mermaid text legibility is handled by matching the Mermaid THEME to the
       page theme at render time (see the init script below) — NOT by force-
       setting `fill: var(--text)`, which painted light text onto the light
       section backgrounds of gantt/quadrant charts (light-on-light → invisible).
       Only the flowchart edge-label chip keeps a surface background so the edge
       text never sits on a graph line. */
    .mermaid .edgeLabel { background: var(--surface) !important; }
    /* Hover-on-ID tooltip: floating box + the hover affordance on tagged IDs. */
    #ps-tip { position: fixed; z-index: 80; display: none; max-width: 22rem; background: var(--surface); color: var(--text); border: 1px solid var(--border); border-radius: 8px; box-shadow: var(--shadow); padding: .5rem .7rem; font-size: .82rem; line-height: 1.4; pointer-events: none; }
    #ps-tip .ps-tip-h strong { color: var(--accent); }
    #ps-tip .ps-tip-t { font-weight: 600; }
    #ps-tip .ps-tip-m { margin-top: .25rem; color: var(--muted); font-size: .76rem; }
    .ps-tipword { cursor: help; }
    span.ps-tipword { text-decoration: underline dotted var(--border); text-underline-offset: 2px; }
  </style>
</head>
<body>
  <button class="ps-toggle" onclick="psToggleTheme()" aria-label="Toggle light/dark theme" title="Toggle theme">☾</button>
  <div class="ps-wrap">
    <h1>{{title}}</h1>
    <div class="ps-meta">Generated {{generated_at}} · Product: {{product_name}} · View: {{view}}</div>
    <div class="controls">
      <button onclick="zoomIn()">Zoom +</button>
      <button onclick="zoomOut()">Zoom -</button>
      <button onclick="resetZoom()">Reset</button>
    </div>
    <div class="diagram ve-card ve-card--recessed" id="diagram"><div id="diagram-scale">{{view_body}}</div></div>
    <p class="ps-meta">{{footer_note}}</p>
  </div>
  {{tooltip_data}}
  <script>
{{mermaid_js}}
  </script>
  {{tooltip_js}}
  <script>
    if (window.mermaid) {
      // Match the Mermaid theme to the page theme so diagram text/background
      // stay legible in dark mode (a "default"-theme chart has light section
      // fills that hide light text on a dark page).
      var psDark = document.documentElement.getAttribute("data-theme") === "dark";
      window.mermaid.initialize({ startOnLoad: true, securityLevel: "strict", theme: psDark ? "dark" : "default" });
    }
    let scale = 1;
    function applyScale() {
      // Scale the inner wrapper, NOT #diagram itself: #diagram carries the
      // .ve-card class whose shared ps-fade entrance animation (fill-mode: both)
      // holds `transform: none` on the to-keyframe, and an animation's value wins
      // over inline style — scaling #diagram would be silently clobbered. The
      // wrapper has no animated transform, and #diagram keeps overflow:auto so a
      // zoomed-in diagram becomes scrollable instead of clipping.
      const d = document.getElementById("diagram-scale");
      d.style.transform = `scale(${scale})`;
      d.style.transformOrigin = "top left";
    }
    function zoomIn() { scale = Math.min(scale + 0.1, 3); applyScale(); }
    function zoomOut() { scale = Math.max(scale - 0.1, 0.3); applyScale(); }
    function resetZoom() { scale = 1; applyScale(); }
  </script>
</body>
</html>
