<!DOCTYPE html>
<html lang="{{lang}}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{title}}</title>
  {{viewer_head}}
  <style>
    /* Legacy graph-view specifics layered on the shared design system. */
    .diagram { overflow: auto; }
    .controls { margin-bottom: 0.75rem; }
    .controls button { padding: 4px 10px; margin-right: 6px; cursor: pointer; background: var(--surface); color: var(--text); border: 1px solid var(--border); border-radius: 6px; }
    /* Make Mermaid diagram text follow the light/dark theme (it hardcodes dark
       ink otherwise, illegible in dark mode). */
    .mermaid .nodeLabel, .mermaid .edgeLabel, .mermaid span, .mermaid text { color: var(--text) !important; fill: var(--text) !important; }
    .mermaid .edgeLabel { background: var(--surface) !important; }
  </style>
</head>
<body>
  <button class="ps-toggle" onclick="psToggleTheme()" aria-label="Toggle light/dark theme" title="Toggle theme">☾</button>
  <div class="ps-wrap">
    <h1>{{title}}</h1>
    <div class="ps-meta">Generated {{generated_at}} · Product: {{product_name}} · View: {{view}}</div>
    <div class="controls">
      <button onclick="zoomIn()">Zoom +</button>
      <button onclick="zoomOut()">Zoom -</button>
      <button onclick="resetZoom()">Reset</button>
    </div>
    <div class="diagram ve-card ve-card--recessed" id="diagram"><div id="diagram-scale">{{view_body}}</div></div>
    <p class="ps-meta">{{footer_note}}</p>
  </div>
  <script>
{{mermaid_js}}
  </script>
  <script>
    if (window.mermaid) {
      window.mermaid.initialize({ startOnLoad: true, securityLevel: "strict" });
    }
    let scale = 1;
    function applyScale() {
      // Scale the inner wrapper, NOT #diagram itself: #diagram carries the
      // .ve-card class whose shared ps-fade entrance animation (fill-mode: both)
      // holds `transform: none` on the to-keyframe, and an animation's value wins
      // over inline style — scaling #diagram would be silently clobbered. The
      // wrapper has no animated transform, and #diagram keeps overflow:auto so a
      // zoomed-in diagram becomes scrollable instead of clipping.
      const d = document.getElementById("diagram-scale");
      d.style.transform = `scale(${scale})`;
      d.style.transformOrigin = "top left";
    }
    function zoomIn() { scale = Math.min(scale + 0.1, 3); applyScale(); }
    function zoomOut() { scale = Math.max(scale - 0.1, 0.3); applyScale(); }
    function resetZoom() { scale = 1; applyScale(); }
  </script>
</body>
</html>
