  <style>
/* product-spec shared design system — ONE source for every HTML output
   (the 9 --viz views + board + explorer + export). Theme via [data-theme];
   semantic + status palette; .ve-card depth tiers; print-CSS; stagger. */
:root{
  --bg:#fbfbfa; --surface:#fff; --recessed:#f4f4f2; --text:#1f2328; --muted:#6a737d;
  --border:#e2e2df; --accent:#3b6ea5; --shadow:0 1px 2px rgba(0,0,0,.06),0 2px 8px rgba(0,0,0,.04);
  --green:#1a7f37; --red:#cf222e; --amber:#9a6700; --sage:#3d7d6e; --teal:#1b6b75; --plum:#8250df;
  --green-dim:#dafbe1; --red-dim:#ffebe9; --amber-dim:#fff8c5; --sage-dim:#d8f3ec; --teal-dim:#d4f0f3; --plum-dim:#f3eafc;
}
[data-theme="dark"]{
  --bg:#0d1117; --surface:#161b22; --recessed:#1c2128; --text:#e6edf3; --muted:#8b949e;
  --border:#30363d; --accent:#6ea8fe; --shadow:0 1px 2px rgba(0,0,0,.4);
  --green:#3fb950; --red:#f85149; --amber:#d29922; --sage:#56d4bc; --teal:#39c0d0; --plum:#bc8cff;
  --green-dim:#12361f; --red-dim:#3c1618; --amber-dim:#3a2d04; --sage-dim:#0f352e; --teal-dim:#0d343a; --plum-dim:#2a1b46;
}
*{box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--text);margin:0;padding:2rem 1.5rem;line-height:1.55;}
.ps-wrap{max-width:1100px;margin:0 auto;}
h1{font-size:1.6rem;margin:0 0 .25rem;} h2{font-size:1.2rem;margin:1.4rem 0 .5rem;} h3{font-size:1rem;margin:1rem 0 .4rem;}
a{color:var(--accent);} code,pre{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:.85rem;}
pre{background:var(--recessed);padding:1rem;border-radius:6px;overflow:auto;}
.ps-meta{color:var(--muted);font-size:.85rem;margin-bottom:1.25rem;}
.ve-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:1rem;min-width:0;}
.ve-card--elevated{box-shadow:var(--shadow);}
.ve-card--recessed{background:var(--recessed);}
.ve-card--hero{border-left:4px solid var(--accent);}
.badge{display:inline-block;font-size:.72rem;padding:.1rem .5rem;border-radius:999px;border:1px solid var(--border);margin:.1rem .25rem .1rem 0;white-space:nowrap;}
.badge--status{background:var(--teal-dim);color:var(--teal);}
.badge--moscow{background:var(--plum-dim);color:var(--plum);}
.badge--persona{background:var(--sage-dim);color:var(--sage);}
.badge--type{background:var(--amber-dim);color:var(--amber);}
.ps-toggle{position:fixed;top:1rem;right:1rem;background:var(--surface);border:1px solid var(--border);color:var(--text);border-radius:999px;width:2.2rem;height:2.2rem;cursor:pointer;font-size:1rem;box-shadow:var(--shadow);z-index:50;}
.ps-banner{background:var(--red-dim);color:var(--red);border:1px solid var(--red);border-radius:6px;padding:.6rem .9rem;margin-bottom:1rem;font-size:.85rem;}
.ps-fallback{white-space:pre-wrap;}
/* Slide-in detail panel — ONE definition shared by board + explorer (was
   duplicated, and explorer had diverged: it hardcoded the geometry inline and
   omitted the :first-child margin reset, so a body opening with a heading gained
   an extra top-margin only in the explorer). */
.ps-detail{position:fixed;top:0;right:0;width:min(34rem,92vw);height:100vh;background:var(--surface);border-left:1px solid var(--border);box-shadow:var(--shadow);padding:1.2rem 1.4rem;overflow:auto;z-index:60;}
.ps-detail .close{position:absolute;top:.6rem;right:.8rem;background:none;border:none;font-size:1.4rem;cursor:pointer;color:var(--muted);}
.ps-detail-body :first-child{margin-top:0;}
.ps-search{width:100%;padding:.5rem .7rem;font-size:.95rem;border:1px solid var(--border);border-radius:6px;background:var(--surface);color:var(--text);margin-bottom:.75rem;}
.ps-facets{display:flex;flex-wrap:wrap;gap:.4rem;margin-bottom:1rem;}
.ps-facets button{font-size:.78rem;padding:.2rem .6rem;border:1px solid var(--border);border-radius:999px;background:var(--surface);color:var(--muted);cursor:pointer;}
.ps-facets button[aria-pressed="true"]{background:var(--accent);color:#fff;border-color:var(--accent);}
.ve-card,.ps-row{animation:ps-fade .28s ease both;}
@keyframes ps-fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
@media print{
  .ps-toggle,.ps-search,.ps-facets,.controls,.ps-detail{display:none!important;}
  body{padding:0;background:#fff;color:#000;} .ve-card{box-shadow:none;border-color:#ccc;break-inside:avoid;}
  details{open:true;} a{color:#000;text-decoration:underline;}
}

<script>

})();
function psToggleTheme(){

  document.documentElement.setAttribute("data-theme",cur);
  try{localStorage.setItem("ps-theme",cur);}catch(e){}
  var b=document.querySelector(".ps-toggle");if(b){b.textContent=cur==="dark"?"☀":"☾";}
}
function psEscapeHtml(s){return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#39;");}
/* NOTE: the markdown sanitize chokepoint is NOT defined here. It is
   body-view-only and ships inside the markdown-libs script block, so the 9
   legacy graph views inline NO sanitizer code (symmetric gating).
   The generic helpers below are shared by every view. */
function psReadSpecData(){

  if(!el){return {};}
  try{return JSON.parse(el.textContent);}catch(e){return {};}
}
/* The detail-panel controls (psOpenDetail/psCloseDetail + Escape) are NOT here:
   they call the sanitize chokepoint, so they ship in the body-view-only script
   block (render_html._BODY_RENDER_JS) to keep the 9 legacy graph views free of
   any sanitizer reference (symmetric gating). */
</script>

  <script type="application/json" id="ps-spec-data">{"cards": [{"body": "**Metrics:** brands-onboarded", "column": "approved", "horizon": "", "id": "BRD-G1", "layer": "goal", "moscow": "", "personas": [], "status": "approved", "title": "Onboard 100 boutique brands in 12 months", "type": "goal"}, {"body": "**Metrics:** repeat-rate-90d", "column": "approved", "horizon": "", "id": "BRD-G2", "layer": "goal", "moscow": "", "personas": [], "status": "approved", "title": "Achieve 80% 90-day repeat-purchase rate", "type": "goal"}, {"body": "**Metrics:** gmv-year1", "column": "approved", "horizon": "", "id": "BRD-G3", "layer": "goal", "moscow": "", "personas": [], "status": "approved", "title": "Reach $2M GMV in the first year", "type": "goal"}, {"body": "**Metrics:** payout-latency-days", "column": "approved", "horizon": "", "id": "BRD-G4", "layer": "goal", "moscow": "", "personas": [], "status": "approved", "title": "Keep average brand payout latency under 3 days", "type": "goal"}, {"body": "**Metrics:** mobile-mau", "column": "review", "horizon": "", "id": "BRD-G5", "layer": "goal", "moscow": "", "personas": [], "status": "review", "title": "Launch native mobile shopping by year 2", "type": "goal"}, {"body": "**Metrics:** brands-onboarded-y3", "column": "draft", "horizon": "", "id": "BRD-G6", "layer": "goal", "moscow": "", "personas": [], "status": "draft", "title": "Scale to 500 brands with cross-brand discovery (year 3)", "type": "goal"}, {"body": "# Brand Analytics — PRD PRD-ANALYTICS\n\n## Overview & Problem\n\nBrands can sell, get paid, and message fans — but they cannot yet see how the business is doing in one place. Today a\nbrand-owner stitches together checkout receipts, payout statements, and gut feel. Analytics gives them a revenue\ndashboard: revenue over time, top products, repeat-vs-new mix, and exportable reports. ops-manager gets the same lens\nacross brands to spot payout or GMV anomalies early. Planned for the back half of year 2 (status: draft).\n\n## Personas\n\n- **brand-owner** — wants to see revenue trends, best sellers, and repeat-customer mix at a glance.\n- **ops-manager** — wants a cross-brand view to catch GMV dips and payout anomalies.\n\n## Use Cases / Flows\n\n1. brand-owner opens the dashboard and views revenue over a selectable date range.\n2. brand-owner drills into top products and the repeat-vs-new buyer split.\n3. brand-owner exports the period's report as CSV for their accountant.\n4. ops-manager views the cross-brand roll-up to monitor BRD-G3 (GMV) and BRD-G4 (payout health).\n\n## Functional Requirements (MoSCoW)\n\n### Must\n\n- Revenue-over-time chart with selectable date ranges.\n- Top-products breakdown for the period.\n- CSV export of the period's revenue report.\n\n### Should\n\n- Repeat-vs-new buyer mix (ties to the north-star repeat-rate).\n- ops-manager cross-brand roll-up view.\n\n### Could\n\n- Cohort retention curves per acquisition month.\n- Scheduled emailed weekly summary.\n\n### Won't (this round)\n\n- Real-time / streaming analytics (nightly rollups are sufficient).\n- Custom report builder.\n\n## Non-Functional Requirements\n\n- All analytics queries served from read replicas + nightly rollup tables; never the storefront primary.\n- Dashboard first paint under 2s for a typical brand's data volume.\n- Numbers reconcile with payout statements (single source of truth: the ledger).\n\n## Success Metrics → BRD Goals\n\n- **dashboard-dau** → BRD-G3 (brands who watch revenue grow it) and BRD-G4 (ops catching payout anomalies fast).\n\n## Dependencies & Risks\n\n- Depends on PRD-PAYOUTS — analytics revenue figures derive from the payout ledger, the single source of truth.\n- **Query load on primary** (impact: med, likelihood: med — open) — analytics traffic could degrade storefront\n  latency. Mitigation planned: read replicas + nightly rollups, never the primary.\n\n## Competitive Parity\n\n- vs COMP-SHOPIFY — **behind**; Shopify's analytics suite is mature and deep. We aim for the few numbers a boutique\n  brand actually acts on, not parity on breadth.\n", "column": "draft", "horizon": "next", "id": "PRD-ANALYTICS", "layer": "prd", "moscow": "should", "personas": ["brand-owner", "ops-manager"], "status": "draft", "title": "Brand Analytics", "type": "prd"}, {"body": "# Revenue Dashboard Epic\n\n## Goal\n\nA brand-owner can see revenue over time and export a period report; ops gets a cross-brand roll-up.\n\n## Business Context\n\n- PRD requirement: revenue-over-time chart + CSV report export.\n- BRD goal: BRD-G3 (brands who watch revenue grow it) and BRD-G4 (ops catching payout/GMV anomalies early).\n\n## Success Criteria\n\nDashboard numbers reconcile with payout statements; first paint under 2s; export matches on-screen totals.\n\n## Scope\n\nRevenue-over-time chart with date ranges, top-products breakdown, CSV export, and the ops cross-brand roll-up. Cohort\nretention and a custom report builder are out.\n\n## Risks\n\n- **Query load on primary** (impact: med, likelihood: med — open) — analytics traffic degrading storefront latency.\n  Mitigation planned: serve from read replicas + nightly rollup tables, never the primary.\n", "column": "draft", "horizon": "next", "id": "PRD-ANALYTICS-E1", "layer": "epic", "moscow": "should", "personas": ["brand-owner", "ops-manager"], "status": "draft", "title": "Revenue Dashboard Epic", "type": "epic"}, {"body": "# View revenue over time — Story PRD-ANALYTICS-E1-S1\n\n## User Story\n\n**As a** brand-owner, **I want** to see my revenue over time, **so that** I can tell whether the business is growing\nand which periods worked.\n\n## Acceptance Criteria\n\n- Given a brand-owner on the dashboard, when they select a date range, then a revenue-over-time chart renders for that range from the rollup tables.\n- Given the revenue chart, when the data loads, then the totals reconcile with the brand's payout statements for the same period.\n", "column": "draft", "horizon": "next", "id": "PRD-ANALYTICS-E1-S1", "layer": "story", "moscow": "should", "personas": ["brand-owner"], "status": "draft", "title": "View revenue over time", "type": "story"}, {"body": "# Export report CSV — Story PRD-ANALYTICS-E1-S2\n\n## User Story\n\n**As a** brand-owner, **I want** to export my revenue report as a CSV, **so that** I can share it with my accountant or\nanalyze it in a spreadsheet.\n\n## Acceptance Criteria\n\n- Given a brand-owner viewing a period, when they export the report, then a CSV of revenue, orders, and top products for that period downloads.\n- Given the exported CSV, when opened, then its revenue total matches the dashboard figure for the same range.\n", "column": "draft", "horizon": "next", "id": "PRD-ANALYTICS-E1-S2", "layer": "story", "moscow": "should", "personas": ["brand-owner", "ops-manager"], "status": "draft", "title": "Export report CSV", "type": "story"}, {"body": "# Catalog & Storefront — PRD PRD-CATALOG\n\n## Overview & Problem\n\nA brand cannot sell what it cannot list. Catalog was the second core-value piece shipped (Aug 2024): the brand-facing\ntools to add products, track inventory, and publish a storefront, and the shopper-facing browse + product-detail\nsurface. It is the front door of every brand on Acme. Today it backs all 120+ brands; median time-to-first-product is\nunder 20 minutes via the guided wizard and CSV import.\n\n## Personas\n\n- **store-admin** — manages the catalog day-to-day: adds products, edits variants, keeps stock accurate.\n- **brand-owner** — sets up the storefront, curates what is published, owns the brand presentation.\n- **shopper** — browses the catalog and opens product detail pages before buying.\n\n## Use Cases / Flows\n\n1. store-admin adds a product (title, photos, price, variants) or bulk-imports a CSV.\n2. store-admin sets and adjusts inventory counts per variant.\n3. brand-owner publishes the product to the live storefront.\n4. shopper browses the brand's catalog (categories, search) and opens a product detail page.\n5. shopper adds to cart → hands off to checkout (PRD-CHECKOUT).\n\n## Functional Requirements (MoSCoW)\n\n### Must\n\n- Add / edit / archive products with photos, price, description, and variants (size, color).\n- Per-variant inventory tracking with atomic decrement at order time (oversell guard).\n- Publish / unpublish to the live storefront.\n- Shopper browse: category navigation, in-catalog search.\n- Product detail page with gallery, variant selector, stock state, add-to-cart.\n\n### Should\n\n- CSV bulk import for brands migrating an existing catalog.\n- Guided first-product wizard to cut time-to-first-product.\n\n### Could\n\n- Collections / lookbooks for curated merchandising.\n\n### Won't (this round)\n\n- Cross-brand catalog search (that is PRD-DISCOVERY, deliberately out of scope).\n- Digital / non-physical products.\n\n## Non-Functional Requirements\n\n- Storefront browse pages cached at the edge; first paint under 1.5s on 4G.\n- Inventory writes serialized so concurrent drop traffic cannot oversell.\n- Catalog edits visible on the live storefront within 60s of publish.\n\n## Success Metrics → BRD Goals\n\n- **catalog-publish-rate** → BRD-G1 (a published catalog is a live brand we can count toward onboarding).\n- **time-to-first-product** → BRD-G1, BRD-G3 (faster to first product = faster to first sale = GMV sooner).\n\n## Scope In / Out\n\n**In scope:** single-brand catalog management, inventory, storefront browse + product detail.\n\n**Out of scope:** cross-brand discovery (PRD-DISCOVERY), advanced merchandising rules.\n\n## Dependencies & Risks\n\n- **Inventory oversell** (impact: high, likelihood: low — mitigated) — concurrent drop traffic racing on stock counts.\n  Mitigation shipped: atomic decrement + reserved-stock window.\n- **Slow first-product onboarding** (impact: med, likelihood: med — accepted) — friction before a brand sees value.\n  Accepted with the CSV import + wizard; tracked via time-to-first-product.\n\n## Competitive Parity\n\n- vs COMP-SHOPIFY — **behind** on app/theme ecosystem and merchandising depth; acceptable for our segment.\n- vs COMP-BIGCARTEL — **parity** on simple-catalog management for small brands.\n- vs COMP-ETSY — **behind** on discovery surface, by design (no marketplace).\n", "column": "approved", "horizon": "now", "id": "PRD-CATALOG", "layer": "prd", "moscow": "must", "personas": ["store-admin", "brand-owner", "shopper"], "status": "approved", "title": "Catalog & Storefront", "type": "prd"}, {"body": "# Catalog Management Epic\n\n## Goal\n\nA store-admin can add, edit, publish products and keep inventory accurate.\n\n## Business Context\n\n- PRD requirement: product CRUD, per-variant inventory, publish/unpublish.\n- BRD goal: BRD-G1 (a populated, published catalog is what makes a brand \"live\").\n\n## Success Criteria\n\nA new product is publishable within minutes; inventory never oversells during a drop. _Shipped Jul 2024; median\ntime-to-first-product under 20 minutes._\n\n## Scope\n\nProduct add/edit/archive with variants and photos, per-variant inventory tracking with atomic decrement, publish to\nthe live storefront. CSV import is in this epic; merchandising rules are out.\n\n## Risks\n\n- **Inventory oversell** (impact: high, likelihood: low — mitigated) — concurrent stock edits during a drop race.\n  Mitigation shipped: atomic decrement with a reserved-stock window.\n", "column": "approved", "horizon": "now", "id": "PRD-CATALOG-E1", "layer": "epic", "moscow": "must", "personas": ["store-admin", "brand-owner"], "status": "approved", "title": "Catalog Management Epic", "type": "epic"}, {"body": "# Add and publish a product — Story PRD-CATALOG-E1-S1\n\n## User Story\n\n**As a** store-admin, **I want** to add a product and publish it, **so that** fans can find and buy it on our\nstorefront.\n\n## Acceptance Criteria\n\n- Given a store-admin on the catalog, when they add a product with title, price, photos, and variants, then it is saved as a draft and appears in the catalog list.\n- Given a draft product, when the store-admin publishes it, then it appears on the live storefront within 60 seconds.\n", "column": "approved", "horizon": "now", "id": "PRD-CATALOG-E1-S1", "layer": "story", "moscow": "must", "personas": ["store-admin"], "status": "approved", "title": "Add and publish a product", "type": "story"}, {"body": "# Track inventory per variant — Story PRD-CATALOG-E1-S2\n\n## User Story\n\n**As a** store-admin, **I want** accurate per-variant stock counts, **so that** we never oversell during a drop and\nfans see what is actually available.\n\n## Acceptance Criteria\n\n- Given a product with variant stock counts, when an order is placed, then the matching variant stock is decremented atomically.\n- Given a variant at zero stock, when a shopper opens the product, then that variant is shown as sold out and cannot be added to cart.\n", "column": "approved", "horizon": "now", "id": "PRD-CATALOG-E1-S2", "layer": "story", "moscow": "must", "personas": ["store-admin"], "status": "approved", "title": "Track inventory per variant", "type": "story"}, {"body": "# Brand Storefront Epic\n\n## Goal\n\nA shopper can browse a brand's storefront and open a product detail page ready to add to cart.\n\n## Business Context\n\n- PRD requirement: shopper browse (categories, search) + product detail page.\n- BRD goal: BRD-G3 (the storefront is the surface that converts browsing into GMV).\n- Depends on PRD-CATALOG-E1 (products must exist and be published before they can be browsed).\n\n## Success Criteria\n\nBrowse first-paint under 1.5s on 4G; product detail add-to-cart works for every in-stock variant. _Shipped Aug 2024._\n\n## Scope\n\nCategory navigation, in-catalog search, and the product detail page (gallery, variant selector, stock state,\nadd-to-cart). Cross-brand search is out (PRD-DISCOVERY).\n\n## Risks\n\n- **Slow image-heavy PDP on mobile** (impact: med, likelihood: med — mitigated) — large galleries hurt load time.\n  Mitigation shipped: responsive image CDN + lazy-loading below the fold.\n", "column": "approved", "horizon": "now", "id": "PRD-CATALOG-E2", "layer": "epic", "moscow": "must", "personas": ["shopper", "brand-owner"], "status": "approved", "title": "Brand Storefront Epic", "type": "epic"}, {"body": "# Browse the catalog — Story PRD-CATALOG-E2-S1\n\n## User Story\n\n**As a** shopper, **I want** to browse and search a brand's catalog, **so that** I can find the piece I want quickly.\n\n## Acceptance Criteria\n\n- Given a shopper on a brand storefront, when they browse a category, then published products in that category are listed with photo, name, and price.\n- Given a shopper using in-catalog search, when they enter a query, then matching published products are returned within 1 second.\n", "column": "approved", "horizon": "now", "id": "PRD-CATALOG-E2-S1", "layer": "story", "moscow": "must", "personas": ["shopper"], "status": "approved", "title": "Browse the catalog", "type": "story"}, {"body": "# Product detail page — Story PRD-CATALOG-E2-S2\n\n## User Story\n\n**As a** shopper, **I want** a clear product page with photos, variants, and stock, **so that** I can decide and add\nthe right item to my cart.\n\n## Acceptance Criteria\n\n- Given a shopper on a product detail page, when they select an in-stock variant, then the add-to-cart button is enabled and reflects the variant price.\n- Given a product with multiple photos, when the page loads on mobile, then the gallery is swipeable and images lazy-load below the fold.\n", "column": "approved", "horizon": "now", "id": "PRD-CATALOG-E2-S2", "layer": "story", "moscow": "must", "personas": ["shopper"], "status": "approved", "title": "Product detail page", "type": "story"}, {"body": "# Checkout — PRD PRD-CHECKOUT\n\n## Overview & Problem\n\nAt launch, shoppers could browse a brand's catalog but could not buy. Direct payment is the table-stakes feature of\nthe whole product — without it, the value proposition (\"sell directly to your fans\") does not exist. Checkout was the\nfirst thing we shipped (Q3 2024) and remains core-value: every dollar of GMV and every repeat purchase flows through\nit. It is now live across all 120+ brands and runs at ~78% completion, ahead of the 75% target.\n\n## Personas\n\n- **shopper** — a returning fan completing a purchase, usually on mobile, often signed out between drops.\n\n## Use Cases / Flows\n\n1. Shopper adds one or more items to the cart from a brand's storefront.\n2. Shopper opens checkout; if signed out, signs in via a magic link (no password).\n3. Shopper enters or selects a saved delivery address and pays via Stripe Checkout.\n4. Shopper confirms; receives a confirmation email and an order-tracking link.\n5. Shopper can return later to track order status from the link.\n\n## Functional Requirements (MoSCoW)\n\n### Must\n\n- Cart with add / remove / quantity controls, persisted across the sign-in hop.\n- Magic-link sign-in at checkout (passwordless).\n- Single-page checkout form: delivery address + payment.\n- Payment via Stripe Checkout (Stripe holds all card data).\n- Order confirmation email with receipt + tracking link.\n\n### Should\n\n- Saved addresses for returning shoppers, pre-filled on the next purchase.\n- Order-status tracking page (placed → fulfilled → shipped → delivered).\n\n### Could\n\n- Apple Pay / Google Pay express checkout.\n\n### Won't (this round)\n\n- Multi-currency checkout (single settlement currency per brand for now).\n- Split payments / installments.\n\n## Non-Functional Requirements\n\n- Checkout page interactive under 2s on a 4G mobile connection.\n- PCI compliance fully delegated to Stripe; no card data touches Acme servers.\n- Cart and address state survive a magic-link round-trip without data loss.\n- 99.9% checkout availability; payment failures degrade gracefully with a retry.\n\n## Success Metrics → BRD Goals\n\n- **checkout-completion-rate** → BRD-G1 (brands ship orders so we keep onboarding), BRD-G2 (repeat purchases compound),\n  BRD-G3 (completed checkouts are the GMV). Current: ~78% vs 75% target.\n\n## Scope In / Out\n\n**In scope:** sign-in, address, payment, confirmation, order tracking for the web storefront.\n\n**Out of scope:** mobile-native checkout (see PRD-MOBILE), multi-currency, subscriptions.\n\n## Dependencies & Risks\n\n- **Stripe KYC delay** (impact: high, likelihood: med — mitigated) — a brand's first payout could stall behind Stripe\n  verification, blocking go-live. Mitigation shipped: KYC is pre-collected during onboarding.\n- **Mobile cart abandonment** (impact: med, likelihood: med — accepted) — a long single-page form hurts completion on\n  4G. Accepted with inline validation + saved addresses; revisit if completion dips below target.\n\n## Competitive Parity\n\nParity is judged against the BRD competitors (identity lives in `brd.md`):\n\n- vs COMP-SHOPIFY — **behind** on ecosystem breadth (apps, themes); deliberate — we win on direct-to-fan economics.\n- vs COMP-BIGCARTEL — **parity** on storefront-checkout simplicity.\n- vs COMP-ETSY — **behind** on marketplace discovery, by design (we are not a marketplace).\n", "column": "approved", "horizon": "now", "id": "PRD-CHECKOUT", "layer": "prd", "moscow": "must", "personas": ["shopper"], "status": "approved", "title": "Checkout", "type": "prd"}, {"body": "# Sign-In + Address Epic\n\n## Goal\n\nShoppers can sign in and enter a delivery address, ready to pay.\n\n## Business Context\n\n- PRD requirement: Magic-link sign-in + single-page address entry.\n- BRD goal: BRD-G1 (brands ship orders so we onboard more).\n\n## Success Criteria\n\nSign-in success rate above 90%; address-step completion above 80%. _Shipped Aug 2024; both criteria met in production._\n\n## Scope\n\nSign-in (email magic link), address entry, and saved addresses for returning shoppers. Payment + confirmation are the\nfollow-on Stripe Payment epic (PRD-CHECKOUT-E2).\n\n## Risks\n\n- **Magic-link spam** (impact: med, likelihood: med — mitigated) — sign-in emails caught by spam filters. Mitigation\n  shipped: authenticated sending domain (SPF/DKIM) + resend fallback.\n", "column": "approved", "horizon": "now", "id": "PRD-CHECKOUT-E1", "layer": "epic", "moscow": "must", "personas": ["shopper"], "status": "approved", "title": "Sign-In + Address Epic", "type": "epic"}, {"body": "# Magic-link sign-in at checkout — Story PRD-CHECKOUT-E1-S1\n\n## User Story\n\n**As a** shopper, **I want** to sign in via a magic link at checkout, **so that** I don't have to remember a password\nand can complete my purchase quickly.\n\n## Acceptance Criteria\n\n- Given a shopper at checkout, when they enter a valid email, then a magic-link sign-in email is sent within 30 seconds.\n- Given a shopper who clicked the magic link, when they return to the tab, then their cart is preserved and the checkout form is pre-filled with any saved address.\n", "column": "approved", "horizon": "now", "id": "PRD-CHECKOUT-E1-S1", "layer": "story", "moscow": "must", "personas": ["shopper"], "status": "approved", "title": "Magic-link sign-in at checkout", "type": "story"}, {"body": "# Saved addresses for returning shoppers — Story PRD-CHECKOUT-E1-S2\n\n## User Story\n\n**As a** shopper, **I want** my delivery address remembered between purchases, **so that** I can check out faster on my\nnext order without retyping it.\n\n## Acceptance Criteria\n\n- Given a returning shopper who saved an address on a prior order, when they reach the address step, then their default saved address is pre-selected.\n- Given a shopper editing the address, when they save a new address, then it is stored on their account and offered on the next checkout.\n", "column": "approved", "horizon": "now", "id": "PRD-CHECKOUT-E1-S2", "layer": "story", "moscow": "should", "personas": ["shopper"], "status": "approved", "title": "Saved addresses for returning shoppers", "type": "story"}, {"body": "# Stripe Payment Epic\n\n## Goal\n\nA signed-in shopper can pay with Stripe and receive an order confirmation.\n\n## Business Context\n\n- PRD requirement: Payment via Stripe Checkout + order confirmation email.\n- BRD goal: BRD-G1 (brands ship orders so we onboard more).\n- Depends on PRD-CHECKOUT-E1 (sign-in + address must exist before payment).\n\n## Success Criteria\n\nPayment success rate above 95%; confirmation email delivered within 1 minute of payment. _Shipped Sep 2024; running\nabove target._\n\n## Scope\n\nStripe Checkout payment widget, payment confirmation, order confirmation email.\n\n## Risks\n\n- **Webhook delay** (impact: med, likelihood: low — mitigated) — Stripe webhook lags the redirect. Mitigation shipped:\n  poll the PaymentIntent on the return URL.\n", "column": "approved", "horizon": "now", "id": "PRD-CHECKOUT-E2", "layer": "epic", "moscow": "must", "personas": ["shopper"], "status": "approved", "title": "Stripe Payment Epic", "type": "epic"}, {"body": "# Pay with Stripe at checkout — Story PRD-CHECKOUT-E2-S1\n\n## User Story\n\n**As a** shopper, **I want** to pay with my card via Stripe at checkout, **so that** I can complete my order and\nreceive a confirmation.\n\n## Acceptance Criteria\n\n- Given a signed-in shopper with items in the cart, when they submit valid card details via Stripe Checkout, then the payment is authorized and an order is created.\n- Given a successful payment, when Stripe confirms the charge, then a confirmation email with the order summary is sent within 1 minute.\n", "column": "approved", "horizon": "now", "id": "PRD-CHECKOUT-E2-S1", "layer": "story", "moscow": "must", "personas": ["shopper"], "status": "approved", "title": "Pay with Stripe at checkout", "type": "story"}, {"body": "# Order confirmation email — Story PRD-CHECKOUT-E2-S2\n\n## User Story\n\n**As a** shopper, **I want** an email confirming my order with a receipt and tracking link, **so that** I have a record\nof the purchase and a way to follow it.\n\n## Acceptance Criteria\n\n- Given a successful payment, when Stripe confirms the charge, then an order-confirmation email with the receipt and tracking link is sent within 1 minute.\n- Given a confirmation email that fails to send, when the failure is detected, then it is retried and the order still appears in the shopper's account.\n", "column": "approved", "horizon": "now", "id": "PRD-CHECKOUT-E2-S2", "layer": "story", "moscow": "must", "personas": ["shopper"], "status": "approved", "title": "Order confirmation email", "type": "story"}, {"body": "# Order Tracking Epic\n\n## Goal\n\nA shopper can see the status of a placed order, from placed through delivered.\n\n## Business Context\n\n- PRD requirement: order-status tracking page reachable from the confirmation email.\n- BRD goal: BRD-G2 (a smooth post-purchase experience drives the repeat purchase).\n- Depends on PRD-CHECKOUT-E2 (an order must be created and confirmed before it can be tracked).\n\n## Success Criteria\n\nOrder-status page reachable for 100% of placed orders; carrier status reflected within 5 minutes of a tracking update.\n_Shipped Sep 2024 alongside the launch._\n\n## Scope\n\nOrder-status tracking page (placed → fulfilled → shipped → delivered), carrier-webhook ingestion, link from the\nconfirmation email. Returns/refunds are out of scope for this epic.\n\n## Risks\n\n- **Carrier webhook unreliability** (impact: low, likelihood: med — accepted) — status can lag the real shipment.\n  Accepted: show last-known status with a timestamp and link out to the carrier.\n", "column": "approved", "horizon": "now", "id": "PRD-CHECKOUT-E3", "layer": "epic", "moscow": "should", "personas": ["shopper"], "status": "approved", "title": "Order Tracking Epic", "type": "epic"}, {"body": "# Track order status — Story PRD-CHECKOUT-E3-S1\n\n## User Story\n\n**As a** shopper, **I want** to see where my order is after I buy, **so that** I know when to expect it without\nemailing the brand.\n\n## Acceptance Criteria\n\n- Given a shopper with a placed order, when they open the tracking link, then they see the current order status (placed, fulfilled, shipped, delivered).\n- Given a carrier tracking update, when it is received, then the order status and last-updated timestamp reflect it within 5 minutes.\n", "column": "approved", "horizon": "now", "id": "PRD-CHECKOUT-E3-S1", "layer": "story", "moscow": "should", "personas": ["shopper"], "status": "approved", "title": "Track order status", "type": "story"}, {"body": "# Cross-Brand Discovery — PRD PRD-DISCOVERY\n\n## Overview & Problem\n\nThe year-3 ambition (BRD-G6): let a fan of one Acme brand discover adjacent brands they would love — a personalized\ndiscovery feed across the network. This is the most strategically sensitive item in the spec. Done wrong, it turns\nAcme into the very marketplace we promised brands we would never be (ranking brands against each other, taxing\nattention). Marked **scope: out / wont** for now precisely because the team has not yet resolved how to add discovery\nwithout breaking the core promise. It stays in the spec as a tracked, deferred bet, not a committed build.\n\n## Personas\n\n- **shopper** — a fan of one brand who might love an adjacent brand, surfaced by genuine affinity rather than ads.\n\n## Use Cases / Flows\n\n1. shopper who bought from brand A sees a discovery feed of affinity-matched brands.\n2. shopper follows or buys from a newly discovered brand B.\n3. brand-owner opts their brand into (or out of) the discovery network and sees referral attribution.\n\n## Functional Requirements (MoSCoW)\n\n### Must\n\n- _(none committed — the PRD is deferred; requirements are exploratory until the marketplace-risk question is resolved.)_\n\n### Should\n\n- _(deferred)_\n\n### Could\n\n- Personalized cross-brand discovery feed, ranked by fan affinity.\n- Brand opt-in/opt-out controls and referral attribution.\n\n### Won't (this round)\n\n- Any paid placement or pay-to-rank mechanic (would violate the no-marketplace principle).\n- Algorithmic ranking that pits brands against each other for impressions.\n\n## Non-Functional Requirements\n\n- Discovery must be opt-in per brand; a brand can never be surfaced without consent.\n- Ranking signal is fan affinity only — never paid placement, never engagement-maximization at the brand's expense.\n\n## Success Metrics → BRD Goals\n\n- **discovery-ctr** → BRD-G6 (cross-brand discovery click-through is the leading indicator of the year-3 network goal).\n\n## Scope In / Out\n\n**Out of scope (this round):** the entire build. This is a tracked future bet, deliberately not committed.\n\n## Dependencies & Risks\n\n- **Marketplace re-commoditization** (impact: high, likelihood: low — open) — the existential risk: discovery done\n  wrong betrays the core promise to brands. Mitigation principle: opt-in only, affinity-ranked, never paid placement.\n\n## Competitive Parity\n\n- vs COMP-ETSY — **behind**; Etsy is discovery-native. Our deliberate bet is that owned-fan discovery, done without a\n  marketplace tax, can beat Etsy's model on brand economics — if and when we build it.\n", "column": "draft", "horizon": "later", "id": "PRD-DISCOVERY", "layer": "prd", "moscow": "wont", "personas": ["shopper"], "status": "draft", "title": "Cross-Brand Discovery", "type": "prd"}, {"body": "# Cross-Brand Discovery Epic\n\n## Goal\n\nA shopper discovers adjacent opted-in brands via an affinity-ranked feed — without Acme becoming a marketplace.\n\n## Business Context\n\n- PRD requirement: personalized cross-brand discovery feed (exploratory; PRD is deferred).\n- BRD goal: BRD-G6 (the year-3 cross-brand-discovery network).\n\n## Success Criteria\n\nDiscovery click-through (discovery-ctr) demonstrates fans cross brands, with zero paid placement and full brand\nopt-in/opt-out control. _Deferred — no target date; the marketplace-risk question is unresolved._\n\n## Scope\n\nA personalized, affinity-ranked discovery feed across opted-in brands, with brand-level inclusion controls and referral\nattribution. No paid placement, no engagement-maximizing ranking — those are explicitly out.\n\n## Risks\n\n- **Marketplace re-commoditization** (impact: high, likelihood: low — open) — the existential risk that discovery\n  betrays the no-marketplace promise. Mitigation principle: opt-in only, affinity-ranked, never paid placement.\n", "column": "draft", "horizon": "later", "id": "PRD-DISCOVERY-E1", "layer": "epic", "moscow": "wont", "personas": ["shopper"], "status": "draft", "title": "Cross-Brand Discovery Epic", "type": "epic"}, {"body": "# Personalized discovery feed — Story PRD-DISCOVERY-E1-S1\n\n## User Story\n\n**As a** shopper, **I want** to discover other brands I would love, **so that** I can find more makers worth supporting\n— surfaced by genuine fit, not ads.\n\n## Acceptance Criteria\n\n- Given a shopper who bought from one brand, when they open the discovery feed, then they see affinity-matched opted-in brands and no paid placements.\n- Given a brand that has opted out of discovery, when any discovery feed is generated, then that brand never appears in it.\n", "column": "draft", "horizon": "later", "id": "PRD-DISCOVERY-E1-S1", "layer": "story", "moscow": "wont", "personas": ["shopper"], "status": "draft", "title": "Personalized discovery feed", "type": "story"}, {"body": "# Fan-CRM — PRD PRD-FANCRM\n\n## Overview & Problem\n\nThis is the differentiator — the reason a brand chooses Acme over a generic storefront. The core storefront proved the\neconomics; fan-CRM proves the thesis that owning the fan relationship drives repeat purchase (BRD-G2). It gives a\nbrand-owner a direct line to the fans who bought from them: broadcast a drop, reply to a fan, and segment the audience\nby purchase history. Currently in beta with design-partner brands (status: review). Early signal: ~38% broadcast open\nrate against a 40% target, and beta brands show a measurable lift in 90-day repeat rate.\n\n## Personas\n\n- **brand-owner** — composes and sends broadcasts, replies to fans, builds audience segments.\n- **shopper** — receives a broadcast, opens it, replies, and (the goal) comes back to buy.\n\n## Use Cases / Flows\n\n1. brand-owner composes a broadcast (new drop, restock, behind-the-scenes) and sends to a segment or the whole list.\n2. shopper receives the message, opens it, and follows the link back to the storefront.\n3. shopper replies; the reply lands in the brand's inbox.\n4. brand-owner replies from a unified inbox.\n5. brand-owner builds a segment (e.g. \"bought in the last 90 days\", \"spent > $200\") and targets a broadcast at it.\n\n## Functional Requirements (MoSCoW)\n\n### Must\n\n- Broadcast composer with send-to-segment or send-to-all.\n- Per-brand authenticated sending domain, double opt-in, one-click unsubscribe.\n- Reply inbox: incoming fan replies threaded per shopper.\n- Open / click instrumentation per broadcast.\n\n### Should\n\n- Audience segments by purchase history (recency, frequency, lifetime spend).\n- Saved segment definitions reusable across broadcasts.\n\n### Could\n\n- Automated lifecycle messages (post-purchase thank-you, win-back).\n- SMS channel in addition to email.\n\n### Won't (this round)\n\n- Cross-brand messaging or shared audiences (that would break the \"fan list belongs to the brand\" principle).\n- Paid ad audiences / lookalikes.\n\n## Non-Functional Requirements\n\n- Broadcast send fans out without blocking the composer UI; large lists send asynchronously.\n- Deliverability protected: authenticated domains, suppression of unsubscribed/bounced addresses.\n- A fan can unsubscribe in one click; suppression honored on the next send.\n\n## Success Metrics → BRD Goals\n\n- **fan-message-open-rate** → BRD-G2 (engaged fans are the leading indicator of repeat purchase).\n- **repeat-rate-90d** → BRD-G2 (the goal, directly — the whole point of the fan relationship).\n\n## Scope In / Out\n\n**In scope:** per-brand broadcast messaging, reply inbox, purchase-history segments.\n\n**Out of scope:** cross-brand audiences, paid acquisition, a full marketing-automation suite.\n\n## Dependencies & Risks\n\n- **Deliverability / spam** (impact: high, likelihood: med — open) — the single biggest threat; if broadcasts land in\n  spam, the feature is worthless. Mitigation in progress: authenticated domains, double opt-in, one-click unsubscribe.\n- **Low open rates** (impact: med, likelihood: med — open) — would undercut the repeat thesis. Mitigated by beta-first\n  rollout with instrumentation before GA.\n\n## Competitive Parity\n\n- vs COMP-SUBSTACK — **parity** on direct creator→audience messaging; Substack proved the model, we add the commerce\n  spine underneath it.\n- vs COMP-SHOPIFY — **ahead**; Shopify has no native fan-relationship layer, only third-party email apps bolted on.\n- vs COMP-BIGCARTEL — **ahead**; Big Cartel offers no audience messaging at all.\n", "column": "review", "horizon": "next", "id": "PRD-FANCRM", "layer": "prd", "moscow": "should", "personas": ["brand-owner", "shopper"], "status": "review", "title": "Fan-CRM", "type": "prd"}, {"body": "# Fan Messaging Epic\n\n## Goal\n\nA brand-owner can broadcast to fans and reply to them from a unified inbox.\n\n## Business Context\n\n- PRD requirement: broadcast composer (send to segment/all) + reply inbox.\n- BRD goal: BRD-G2 (fan engagement is the leading indicator of the repeat-purchase rate).\n\n## Success Criteria\n\nBroadcast open rate at or above 40%; replies threaded reliably per fan; deliverability protected by authenticated\ndomains. _In beta with design-partner brands; ~38% open rate so far._\n\n## Scope\n\nBroadcast composer with segment/all targeting, deliverability hardening (authenticated domains, double opt-in,\nunsubscribe), open/click instrumentation, and the reply inbox. SMS and lifecycle automation are out of this epic.\n\n## Risks\n\n- **Spam / deliverability** (impact: high, likelihood: med — open) — the make-or-break risk; broadcasts in spam make\n  the feature worthless. Mitigation in progress: authenticated sending domains, double opt-in, one-click unsubscribe.\n", "column": "review", "horizon": "next", "id": "PRD-FANCRM-E1", "layer": "epic", "moscow": "should", "personas": ["brand-owner", "shopper"], "status": "review", "title": "Fan Messaging Epic", "type": "epic"}, {"body": "# Send a fan broadcast — Story PRD-FANCRM-E1-S1\n\n## User Story\n\n**As a** brand-owner, **I want** to broadcast a message to my fans, **so that** I can announce a drop directly to the\npeople who already love the brand.\n\n## Acceptance Criteria\n\n- Given a brand-owner with a composed broadcast, when they send to a segment, then opted-in fans in that segment receive the message and unsubscribed fans are suppressed.\n- Given a sent broadcast, when fans open or click it, then per-broadcast open and click rates are recorded and shown to the brand-owner.\n", "column": "draft", "horizon": "next", "id": "PRD-FANCRM-E1-S1", "layer": "story", "moscow": "should", "personas": ["brand-owner", "shopper"], "status": "draft", "title": "Send a fan broadcast", "type": "story"}, {"body": "# Reply inbox — Story PRD-FANCRM-E1-S2\n\n## User Story\n\n**As a** brand-owner, **I want** fan replies in one inbox I can answer from, **so that** I can have a real conversation\nwith fans instead of losing replies.\n\n## Acceptance Criteria\n\n- Given a fan who replies to a broadcast, when the reply arrives, then it appears threaded under that fan in the brand-owner's inbox.\n- Given a brand-owner reading a reply, when they respond from the inbox, then the fan receives the response from the brand's authenticated sending domain.\n", "column": "draft", "horizon": "next", "id": "PRD-FANCRM-E1-S2", "layer": "story", "moscow": "should", "personas": ["brand-owner", "shopper"], "status": "draft", "title": "Reply inbox", "type": "story"}, {"body": "# Audience Segments Epic\n\n## Goal\n\nA brand-owner can build and save audience segments from purchase history and target broadcasts at them.\n\n## Business Context\n\n- PRD requirement: audience segments by purchase history (recency, frequency, lifetime spend).\n- BRD goal: BRD-G2 (targeted messaging to the right fans drives repeat purchase harder than blasting everyone).\n- Depends on PRD-FANCRM-E1 (broadcasts must exist before segment targeting is useful).\n\n## Success Criteria\n\nA segment's fan count is accurate at save time and stays fresh via nightly recompute; segments are reusable across\nbroadcasts.\n\n## Scope\n\nSegment builder over purchase history, saved/reusable segment definitions, nightly recompute. Predictive/ML\nsegmentation is out.\n\n## Risks\n\n- **Stale segments** (impact: low, likelihood: med — open) — definitions drift as purchase data grows. Mitigation\n  planned: nightly recompute from the rollup tables.\n", "column": "draft", "horizon": "next", "id": "PRD-FANCRM-E2", "layer": "epic", "moscow": "should", "personas": ["brand-owner"], "status": "draft", "title": "Audience Segments Epic", "type": "epic"}, {"body": "# Segment by purchase history — Story PRD-FANCRM-E2-S1\n\n## User Story\n\n**As a** brand-owner, **I want** to build audience segments from purchase history, **so that** I can target the right\nfans — recent buyers, big spenders — instead of blasting everyone.\n\n## Acceptance Criteria\n\n- Given a brand-owner building a segment, when they filter by purchase history (e.g. bought in last 90 days), then the matching fan count is shown and the segment can be saved.\n- Given a saved segment, when the nightly recompute runs, then segment membership reflects the latest purchase data.\n", "column": "draft", "horizon": "next", "id": "PRD-FANCRM-E2-S1", "layer": "story", "moscow": "should", "personas": ["brand-owner"], "status": "draft", "title": "Segment by purchase history", "type": "story"}, {"body": "# Native Mobile Shopping — PRD PRD-MOBILE\n\n## Overview & Problem\n\nShoppers already buy mostly on mobile, but through the mobile web. A native app would let fans browse and buy faster,\nget push notifications for drops (which compounds the fan-CRM bet), and keep Acme on the home screen. This is BRD-G5,\nwhich slipped from its original year-2 target into a later horizon — a deliberate sequencing call to ship fan-CRM and\nanalytics first. Status: draft; scoped as a thin native shell over the proven web checkout to keep a small team's\nmaintenance surface low.\n\n## Personas\n\n- **shopper** — a returning fan who wants a faster, home-screen path to browse and buy, with drop notifications.\n\n## Use Cases / Flows\n\n1. shopper installs the app and signs in (magic link, same as web).\n2. shopper browses a followed brand's catalog in native screens.\n3. shopper buys through the embedded, proven web checkout flow.\n4. shopper receives a push notification when a followed brand drops or restocks.\n\n## Functional Requirements (MoSCoW)\n\n### Must\n\n- Native app shell (iOS + Android) wrapping the storefront.\n- Native browse + product detail for followed brands.\n- Buy via the existing web checkout embedded in the shell.\n\n### Should\n\n- Push notifications for drops and restocks (ties to fan-CRM).\n\n### Could\n\n- Native payment sheets (Apple Pay / Google Pay) in the shell.\n- Offline browse of cached catalog.\n\n### Won't (this round)\n\n- A fully native checkout reimplementation (reuse web; revisit only if metrics justify).\n- Brand-admin tooling on mobile (admin stays web).\n\n## Non-Functional Requirements\n\n- Reuse the web API and design system; no parallel backend.\n- App cold-start under 3s; browse screens scroll at 60fps on mid-range devices.\n- Release cadence accommodates app-store review (batch native changes).\n\n## Success Metrics → BRD Goals\n\n- **mobile-mau** → BRD-G5 (the goal, directly — monthly active mobile shoppers).\n\n## Scope In / Out\n\n**In scope:** native shell, native browse, embedded web checkout, drop push.\n\n**Out of scope:** native checkout reimplementation, brand-admin on mobile.\n\n## Dependencies & Risks\n\n- **App-store review latency** (impact: med, likelihood: med — open) — slows iteration. Mitigation: thin shell over\n  web so most changes ship without a store release.\n- **Second-client maintenance** (impact: low, likelihood: med — open) — doubles surface for a small team. Mitigation:\n  reuse API + design system, defer native-only features.\n\n## Competitive Parity\n\n- vs COMP-SHOPIFY — **behind**; Shopify offers a polished Shop app. We trail on native maturity for now.\n- vs COMP-ETSY — **behind**; Etsy's app is a core channel. Catching up here is the point of BRD-G5.\n", "column": "draft", "horizon": "later", "id": "PRD-MOBILE", "layer": "prd", "moscow": "could", "personas": ["shopper"], "status": "draft", "title": "Native Mobile Shopping", "type": "prd"}, {"body": "# Mobile App Shell Epic\n\n## Goal\n\nA shopper can browse and buy from a followed brand in a native app shell.\n\n## Business Context\n\n- PRD requirement: native app shell with native browse + embedded web checkout.\n- BRD goal: BRD-G5 (native mobile shopping; the channel where most shoppers already are).\n\n## Success Criteria\n\nApp cold-start under 3s; native browse at 60fps; checkout completes through the embedded web flow at parity with web.\n\n## Scope\n\nNative iOS/Android shell, native browse + product detail, embedded web checkout, and drop push notifications. A fully\nnative checkout reimplementation and mobile brand-admin are out.\n\n## Risks\n\n- **App-store review latency** (impact: med, likelihood: med — open) — slows iteration vs the web cadence. Mitigation:\n  thin native shell over web checkout so most changes ship without a store release.\n", "column": "draft", "horizon": "later", "id": "PRD-MOBILE-E1", "layer": "epic", "moscow": "could", "personas": ["shopper"], "status": "draft", "title": "Mobile App Shell Epic", "type": "epic"}, {"body": "# Mobile browse and buy — Story PRD-MOBILE-E1-S1\n\n## User Story\n\n**As a** shopper, **I want** to browse and buy from a followed brand in the app, **so that** I have a fast, native path\nto my favorite brands on my phone.\n\n## Acceptance Criteria\n\n- Given a shopper in the native app, when they open a followed brand, then they can browse the catalog in native screens and open product detail.\n- Given a shopper ready to buy, when they check out, then the existing web checkout is presented in the app shell and completes the order.\n", "column": "draft", "horizon": "later", "id": "PRD-MOBILE-E1-S1", "layer": "story", "moscow": "could", "personas": ["shopper"], "status": "draft", "title": "Mobile browse and buy", "type": "story"}, {"body": "# Brand Payouts — PRD PRD-PAYOUTS\n\n## Overview & Problem\n\nSelling is only half the promise; the brand has to get paid, quickly and correctly. Payouts is the money-movement\nspine: it takes captured order revenue, nets Acme's fee, reconciles against the ledger, and pays the brand on a\npredictable schedule via Stripe Connect. Shipped Dec 2024. It directly owns BRD-G4 (sub-3-day latency) and is running\nat ~1.8 days average latency with a payout-error-rate near zero.\n\n## Personas\n\n- **brand-owner** — wants money in the bank fast and a statement they can reconcile against their own books.\n- **ops-manager** — runs and monitors payout operations; investigates any held or mismatched payout.\n\n## Use Cases / Flows\n\n1. Orders are captured through checkout; revenue accrues to the brand's ledger balance (net of fees).\n2. A scheduled payout run aggregates the brand's available balance.\n3. The run reconciles the ledger against captured payments; any mismatch holds the payout for ops review.\n4. Reconciled payouts are disbursed via Stripe Connect to the brand's bank account.\n5. brand-owner downloads a payout statement (line items, fees, net) for their records.\n\n## Functional Requirements (MoSCoW)\n\n### Must\n\n- Per-brand ledger accruing net revenue per captured order.\n- Scheduled automated payout run (configurable cadence per brand).\n- Double-entry reconciliation before disbursement; hold-on-mismatch.\n- Disbursement via Stripe Connect.\n- Downloadable payout statement (CSV) per period.\n\n### Should\n\n- ops-manager dashboard of pending / held / disbursed payouts.\n\n### Could\n\n- On-demand (instant) payout for an extra fee.\n\n### Won't (this round)\n\n- Multi-currency settlement (single settlement currency per brand).\n- Brand-configurable fee tiers.\n\n## Non-Functional Requirements\n\n- Average payout latency under 3 days (BRD-G4); target the run completes within hours of schedule.\n- Payout runs are idempotent — a retried run never double-pays.\n- Every disbursement is traceable to its ledger entries (audit trail).\n\n## Success Metrics → BRD Goals\n\n- **payout-latency-days** → BRD-G4 (the goal, directly).\n- **payout-error-rate** → BRD-G4 (a correct payout is part of \"under 3 days\" being meaningful).\n\n## Dependencies & Risks\n\n- **Reconciliation mismatch** (impact: high, likelihood: low — mitigated) — an incorrect amount reaching a brand.\n  Mitigation shipped: double-entry reconciliation + hold-on-mismatch.\n- **Stripe schedule drift** (impact: low, likelihood: low — accepted) — Stripe payout timing shifting latency.\n  Accepted; monitored via payout webhooks with an ops alert.\n\n## Competitive Parity\n\n- vs COMP-SHOPIFY — **parity** on payout reliability and cadence; we match the incumbent on money movement and\n  differentiate elsewhere (the fan relationship).\n", "column": "approved", "horizon": "now", "id": "PRD-PAYOUTS", "layer": "prd", "moscow": "must", "personas": ["brand-owner", "ops-manager"], "status": "approved", "title": "Brand Payouts", "type": "prd"}, {"body": "# Automated Payouts Epic\n\n## Goal\n\nA scheduled run reconciles each brand's balance and disburses it via Stripe Connect, with a downloadable statement.\n\n## Business Context\n\n- PRD requirement: scheduled payout run with reconciliation + payout-statement export.\n- BRD goal: BRD-G4 (sub-3-day payout latency — the goal this epic exists to hit).\n\n## Success Criteria\n\nAverage payout latency under 3 days; payout-error-rate near zero; every disbursement traceable to its ledger entries.\n_Shipped Nov 2024; running ~1.8 days._\n\n## Scope\n\nPer-brand ledger, scheduled run, double-entry reconciliation with hold-on-mismatch, Stripe Connect disbursement, and\nCSV statement export. Multi-currency settlement and instant payouts are out.\n\n## Risks\n\n- **Double-pay on retry** (impact: high, likelihood: low — mitigated) — a retried run paying twice. Mitigation shipped:\n  idempotency keys per run + a ledger guard rejecting duplicate disbursement.\n", "column": "approved", "horizon": "now", "id": "PRD-PAYOUTS-E1", "layer": "epic", "moscow": "must", "personas": ["brand-owner", "ops-manager"], "status": "approved", "title": "Automated Payouts Epic", "type": "epic"}, {"body": "# Scheduled payout run — Story PRD-PAYOUTS-E1-S1\n\n## User Story\n\n**As an** ops-manager, **I want** brand balances reconciled and paid out automatically on schedule, **so that** brands\nget their money fast and correctly without manual work.\n\n## Acceptance Criteria\n\n- Given a brand with an available ledger balance, when the scheduled payout run executes, then the balance is reconciled and disbursed via Stripe Connect within the SLA.\n- Given a reconciliation mismatch on a brand, when the payout run reaches that brand, then the payout is held and an ops alert is raised instead of disbursing.\n", "column": "approved", "horizon": "now", "id": "PRD-PAYOUTS-E1-S1", "layer": "story", "moscow": "must", "personas": ["ops-manager", "brand-owner"], "status": "approved", "title": "Scheduled payout run", "type": "story"}, {"body": "# Payout statement export — Story PRD-PAYOUTS-E1-S2\n\n## User Story\n\n**As a** brand-owner, **I want** to download a statement for each payout period, **so that** I can reconcile Acme's\npayouts against my own books.\n\n## Acceptance Criteria\n\n- Given a brand-owner viewing a completed payout period, when they request a statement, then a CSV with line items, fees, and net total downloads.\n- Given a statement CSV, when the brand-owner opens it, then the net total matches the amount disbursed to their bank account.\n", "column": "approved", "horizon": "now", "id": "PRD-PAYOUTS-E1-S2", "layer": "story", "moscow": "should", "personas": ["brand-owner"], "status": "approved", "title": "Payout statement export", "type": "story"}], "col_labels": {"approved": "approved", "draft": "draft", "review": "review"}, "columns": ["draft", "review", "approved"], "group_by": "status", "labels": {"could": "Could", "epic": "Epic", "goal": "Goal", "horizon": "Horizon", "later": "Later", "layer": "Layer", "moscow": "MoSCoW", "must": "Must", "next": "Next", "no_results": "No matching artifacts", "now": "Now", "persona": "Persona", "prd": "PRD", "search": "Search…", "should": "Should", "status": "Status", "story": "Story", "unassigned": "unassigned", "wont": "Won't"}}</script>
