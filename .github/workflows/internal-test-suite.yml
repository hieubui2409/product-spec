name: internal test suite (telemetry + hooks + _shared)

# These three test surfaces (telemetry lenses, project hooks, shared eval-gate) had 26
# tracked test files that no workflow ran — including a test that was red on the default
# branch. This job runs the exact command CONTRIBUTING.md documents as mandatory.
on:
  pull_request:
    paths:
      - '.claude/skills/telemetry/**'
      - '.claude/hooks/**'
      - '.claude/skills/_shared/**'
      - '.github/workflows/internal-test-suite.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        # 1 OS × 2 Python: cheap + deterministic.
        python: ['3.11', '3.13']
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Install test deps (pyyaml + pytest only)
        run: python -m pip install --quiet "pyyaml>=6.0,<7" "pytest>=7,<9"

      - name: Configure git identity (some hook tests spawn git repos)
        run: |
          git config --global user.email ci@example.com
          git config --global user.name CI
          git config --global commit.gpgsign false

      # Canonical command — kept in sync with CONTRIBUTING.md by
      # _shared/lib/__tests__/test_internal_ci_runs_canonical_suite.py
      - name: Run telemetry + hooks + shared eval-gate suite
        run: python -m pytest .claude/skills/telemetry .claude/hooks .claude/skills/_shared -q
