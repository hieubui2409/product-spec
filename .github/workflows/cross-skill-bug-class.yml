name: cross-skill bug_class gate

# Runs the cross-cutting safety/robustness invariants (symlink-escape,
# case-insensitive secret drop, id-collision sentinel, symlink-dropped) selected by
# the `bug_class` marker, PER SKILL (each skill's own conftest/pyproject — never a
# combined-root run, which would race the two product-spec/critique conftests).

on:
  pull_request:
    paths:
      - '.claude/skills/product-spec/**'
      - '.claude/skills/product-spec-critique/**'
      - '.claude/skills/release/**'
      - '.github/workflows/cross-skill-bug-class.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  bug-class:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install test deps (pyyaml + pytest only)
        run: python -m pip install --quiet "pyyaml>=6.0,<7" "pytest>=7,<9"

      - name: Configure git identity (some invariants spawn git repos)
        run: |
          git config --global user.email ci@example.com
          git config --global user.name CI
          git config --global commit.gpgsign false

      - name: product-spec bug_class
        working-directory: .claude/skills/product-spec
        run: python -m pytest scripts/tests -m bug_class -v

      - name: product-spec-critique bug_class
        working-directory: .claude/skills/product-spec-critique
        env:
          CK_OFFLINE: '1'
        run: python -m pytest scripts/tests -m bug_class -v --no-header || [ $? -eq 5 ]

      - name: release bug_class
        working-directory: .claude/skills/release
        run: python -m pytest scripts/tests -m bug_class -v
