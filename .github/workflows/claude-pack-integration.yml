name: claude-pack Integration (live product-spec)

on:
  schedule:
    - cron: '0 0 * * 0'   # Sunday 00:00 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  integration:
    runs-on: ubuntu-latest
    continue-on-error: true   # non-blocking; informational only
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install
        run: bash .claude/skills/claude-pack/install.sh --dev

      - name: Run integration tests (live product-spec dogfood)
        working-directory: .claude/skills/claude-pack
        run: ../.venv/bin/python -m pytest scripts/tests -m integration -v
