name: product-spec-critique CI

on:
  pull_request:
    paths:
      - '.claude/skills/product-spec-critique/**'
      - '.github/workflows/product-spec-critique-ci.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        # 1 OS × 2 Python.
        python: ['3.11', '3.13']
    runs-on: ubuntu-latest
    env:
      # Offline enforcement: the conftest autouse guard blocks any
      # socket connect under this flag so a future net call fails loudly.
      CK_OFFLINE: '1'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Install test deps (pyyaml + pytest only)
        run: python -m pip install --quiet "pyyaml>=6.0,<7" "pytest>=7,<9"

      - name: Run pytest (offline-enforced, scoped to skill tests dir)
        working-directory: .claude/skills/product-spec-critique
        run: python -m pytest scripts/tests -v
