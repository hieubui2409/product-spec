name: product-spec Release

on:
  push:
    tags:
      - 'product-spec-v*.*.*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # need commit history for SOURCE_DATE_EPOCH

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Compute reproducible epoch
        id: epoch
        run: echo "value=$(git log -1 --pretty=%ct ${{ github.sha }})" >> "$GITHUB_OUTPUT"

      - name: Derive version from tag
        id: version
        run: echo "value=${GITHUB_REF#refs/tags/product-spec-v}" >> "$GITHUB_OUTPUT"

      - name: Install
        run: bash .claude/skills/release/install.sh --dev

      - name: Verify skill versions
        run: .claude/skills/.venv/bin/python .claude/skills/release/scripts/verify_skill_versions.py

      - name: Build deterministic tarball
        env:
          SOURCE_DATE_EPOCH: ${{ steps.epoch.outputs.value }}
        run: |
          .claude/skills/.venv/bin/python -m pack \
            --manifest .claude/pack.manifest.yaml \
            --version "${{ steps.version.outputs.value }}" \
            --source-date-epoch env \
            --out dist

      - name: Verify SHA256 sidecar
        working-directory: dist
        run: sha256sum -c product-spec-*.tar.gz.sha256

      - name: Generate release body from locked CHANGELOG section
        run: |
          .claude/skills/.venv/bin/python .claude/skills/release/scripts/release.py \
            --extract "${{ steps.version.outputs.value }}" > dist/RELEASE-BODY.md
          echo "----- release body -----"; cat dist/RELEASE-BODY.md

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: dist/RELEASE-BODY.md
          files: |
            dist/product-spec-*.tar.gz
            dist/product-spec-*.tar.gz.sha256
