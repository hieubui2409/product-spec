name: product-spec CI

on:
  pull_request:
    paths:
      - '.claude/skills/product-spec/**'
      # The eval gate below runs _shared/lib/run_evals.py, so a _shared change can
      # break this workflow without touching product-spec/.
      - '.claude/skills/_shared/**'
      - '.github/workflows/product-spec-ci.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        # 1 OS × 2 Python: cheap + deterministic. Not 3×3.
        python: ['3.11', '3.13']
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Install test deps (pyyaml + pytest only)
        run: python -m pip install --quiet "pyyaml>=6.0,<7" "pytest>=7,<9"

      - name: Configure git identity (tests spawn git repos)
        run: |
          git config --global user.email ci@example.com
          git config --global user.name CI
          git config --global commit.gpgsign false

      - name: Run pytest (scoped to skill tests dir so its conftest + pyproject load)
        working-directory: .claude/skills/product-spec
        run: python -m pytest scripts/tests -v

      - name: Eval gate — run_evals structural subset (no API key)
        run: python .claude/skills/_shared/lib/run_evals.py --skill product-spec
